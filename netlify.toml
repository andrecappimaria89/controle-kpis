[build]
  # Generates public/js/config.js from Netlify environment variables
  # (SUPABASE_URL and SUPABASE_ANON_KEY) before the site is published.
  command = "node scripts/generate-config.js"
  publish = "public"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
